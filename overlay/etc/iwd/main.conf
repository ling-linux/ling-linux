[General]
# 启用 iwd 内置网络配置（DHCP 客户端和 DNS 管理）
# 这对于不安装独立 DHCP 客户端的系统至关重要
EnableNetworkConfiguration=true

# DNS 管理：留空使用 iwd 默认行为（systemd → resolvconf → 无）
# Alpine 无 systemd，如需要 DNS 自动配置可安装 openresolv
# NameResolvingService=resolvconf

[Network]
# 启用 IPv6 支持（iwd >= 2.0 默认启用）
EnableIPv6=true

# 路由优先级偏移量
RoutePriorityOffset=300

[Scan]
# 允许定期扫描发现新网络
DisablePeriodicScan=false
